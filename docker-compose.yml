services:

  mysawit-auth:
    build: .
    container_name: mysawit-auth

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5435/mysawit_auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: mysawit-secret
      JWT_EXPIRATION_MS: 3600000

    ports:
      - "8080:8080"