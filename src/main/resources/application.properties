spring.application.name=mysawit-auth
server.port=${PORT:8080}

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5435/mysawit_auth}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# JWT
jwt.secret=${JWT_SECRET:mysawit-secret-key-for-development-very-secure}
jwt.expiration=${JWT_EXPIRATION_MS:3600000}

# Google OAuth
google.client-id=${GOOGLE_CLIENT_ID:}