spring.application.name=mysawit-auth
server.port=${PORT:8080}

# database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/mysawit_auth}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# HikariCP — keep connections shorter than Neon's idle timeout (5 min)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=20000

# Jackson: serialize dates as ISO strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# jwta
jwt.secret=${JWT_SECRET:dev-secret-key-dev-secret-key-123456}
jwt.expiration=${JWT_EXPIRATION_MS:3600000}

# google oauth
google.client-id=${GOOGLE_CLIENT_ID:}

# show error details (remove after debugging)
server.error.include-message=always
server.error.include-binding-errors=always