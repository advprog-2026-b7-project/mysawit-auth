# Local development profile — uses H2 in-memory DB so no PostgreSQL is needed.
# Run with: ./gradlew bootRun --args='--spring.profiles.active=local'

spring.datasource.url=jdbc:h2:mem:mysawit_auth;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

seed.local=true
seed.users-file=seed/users.csv
seed.assignments-file=seed/assignments.csv
